<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buscador — Torno O-I</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --accent: #f5a623;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --text: #e8eaf0;
  --muted: #7a7f9a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 20px 14px 80px; }

header { text-align: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--accent); }
header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
header p { color: var(--muted); font-size: .8rem; margin-top: 4px; letter-spacing: .05em; text-transform: uppercase; }
.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: .78rem; text-decoration: none; letter-spacing: .06em; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; margin-bottom: 14px; }
.back-link:hover { color: var(--accent); }

/* ULTIMO REGISTRO BANNER */
#ultimoBanner {
  display: none;
  background: rgba(245,166,35,0.1);
  border: 1px solid rgba(245,166,35,0.4);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: .85rem;
  color: var(--accent);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  letter-spacing: .05em;
}

.search-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
.section-label { font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.search-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.field input, .field select {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'Barlow', sans-serif; font-size: .9rem;
  padding: 9px 11px; outline: none; width: 100%;
  appearance: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder { color: var(--muted); }
.field select option, .field select optgroup { background: var(--surface2); }

.btn-search {
  width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 8px;
  color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: .95rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
}
.btn-search:disabled { opacity: .5; cursor: not-allowed; }
.btn-clear {
  width: 100%; padding: 9px; background: transparent; border: 1px solid var(--border);
  border-radius: 8px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
  font-size: .82rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; margin-top: 8px;
}
.btn-clear:hover { border-color: var(--red); color: var(--red); }

/* CAT FILTER PILLS */
.cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.cat-pill {
  background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  font-size: .72rem; font-weight: 700; padding: 5px 12px; border-radius: 20px;
  cursor: pointer; font-family: 'Barlow Condensed', sans-serif; letter-spacing: .05em;
  text-transform: uppercase;
}
.cat-pill.active { background: rgba(245,166,35,.15); border-color: var(--accent); color: var(--accent); }

/* RESULTS */
.results-header { font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.results-header span { color: var(--accent); }

.result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

.result-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.result-fecha { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .88rem; color: var(--accent); }
.result-nombre { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .95rem; color: var(--text); }
.badge-torno { font-family: 'Barlow Condensed', sans-serif; font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; background: rgba(245,166,35,.1); color: var(--accent); border: 1px solid rgba(245,166,35,.3); }

/* COUNTS */
.counts-section { margin-bottom: 10px; }
.counts-group { margin-bottom: 6px; }
.counts-group-title { font-size: .65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; font-family: 'Barlow Condensed', sans-serif; }
.counts-row { display: flex; gap: 6px; flex-wrap: wrap; }
.count-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; font-weight: 600; color: var(--muted); }
.count-item strong { color: var(--text); }
.count-item.nonzero strong { color: var(--accent); }

/* REFS */
.result-refs { display: flex; flex-direction: column; gap: 6px; }
.ref-row { background: var(--surface2); border-radius: 6px; padding: 8px 10px; font-size: .8rem; }
.ref-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.ref-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--accent); letter-spacing: .04em; }
.ref-cat { font-size: .65rem; font-weight: 700; padding: 1px 6px; border-radius: 3px; background: rgba(59,130,246,.15); color: var(--blue); border: 1px solid rgba(59,130,246,.2); font-family: 'Barlow Condensed', sans-serif; }
.ref-sub { font-size: .65rem; font-weight: 700; padding: 1px 6px; border-radius: 3px; background: rgba(245,166,35,.1); color: var(--accent); border: 1px solid rgba(245,166,35,.2); font-family: 'Barlow Condensed', sans-serif; }
.ref-cavs { color: var(--muted); font-size: .76rem; line-height: 1.5; }
.ref-cavs .cav-match { color: var(--green); font-weight: 700; }
.ref-comment { color: var(--muted); font-size: .75rem; margin-top: 2px; font-style: italic; }

.no-results { text-align: center; padding: 32px 16px; color: var(--muted); font-size: .88rem; }
.no-results strong { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
.loading { text-align: center; padding: 32px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: .95rem; letter-spacing: .1em; text-transform: uppercase; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

@media(max-width:480px) { .search-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<a class="back-link" href="https://jesusdpescas.github.io/FORMULARIO-TORNO/">&#8592; Volver al formulario</a>

<header>
  <h1>Buscador — Torno</h1>
  <p>O-I Manufacturing · Consulta de registros</p>
</header>

<div id="ultimoBanner"></div>

<div class="search-card">
  <div class="section-label">Filtros</div>

  <div class="search-grid">
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="filtFecha"/>
    </div>
    <div class="field">
      <label>Nombre</label>
      <select id="filtNombre" onchange="mostrarUltimo()">
        <option value="">— Todos —</option>
        <option>Jorge Garcia</option>
        <option>Fran Melo</option>
        <option>Jonathan Medina</option>
        <option>Jose Luis</option>
        <option>Karen Rodriguez</option>
        <option>Fabio Bolaños</option>
        <option>Jhon Luna</option>
        <option>Edwin Lopez</option>
        <option>Jonathan Pinzon</option>
      </select>
    </div>
    <div class="field">
      <label>Referencia</label>
      <input type="text" id="filtRef" placeholder="Ej: 7677"/>
    </div>
    <div class="field">
      <label>Cavidad</label>
      <input type="number" id="filtCav" placeholder="Ej: 38" min="1" max="120"/>
    </div>
  </div>

  <div class="section-label">Categoría</div>
  <div class="cat-pills">
    <div class="cat-pill active" data-cat="" onclick="toggleCat(this)">Todas</div>
    <div class="cat-pill" data-cat="MOLDES" onclick="toggleCat(this)">Moldes</div>
    <div class="cat-pill" data-cat="PREMOLDES" onclick="toggleCat(this)">Premoldes</div>
    <div class="cat-pill" data-cat="ANILLOS" onclick="toggleCat(this)">Anillos</div>
    <div class="cat-pill" data-cat="TAPAS" onclick="toggleCat(this)">Tapas</div>
  </div>

  <button class="btn-search" id="btnBuscar" onclick="buscar()">Buscar</button>
  <button class="btn-clear" onclick="limpiar()">Limpiar filtros</button>
</div>

<div id="resultsArea"></div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxS3YuseFejR3nuHmBynaVfvkUcXgVWDRuvgs-jnCSFBBmz5lKnt6IUmRhPH5rjlgG6/exec';
var selectedCat = '';

function toggleCat(el) {
  document.querySelectorAll('.cat-pill').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  selectedCat = el.dataset.cat;
}

function mostrarUltimo() {
  var nombre = document.getElementById('filtNombre').value;
  var banner = document.getElementById('ultimoBanner');
  if (!nombre) { banner.style.display = 'none'; return; }

  banner.style.display = 'block';
  banner.textContent = 'Consultando último registro de ' + nombre + '...';

  var url = SCRIPT_URL + '?accion=ultima&nombre=' + encodeURIComponent(nombre) + '&t=' + Date.now();
  fetch(url, {redirect: 'follow'})
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data.ultima) {
        banner.textContent = '📅 Último registro de ' + nombre + ': ' + data.ultima;
      } else {
        banner.textContent = nombre + ' no tiene registros aún.';
      }
    })
    .catch(function() { banner.style.display = 'none'; });
}

function buscar() {
  var filtFecha  = document.getElementById('filtFecha').value;
  var filtNombre = document.getElementById('filtNombre').value.trim();
  var filtRef    = document.getElementById('filtRef').value.trim();
  var filtCav    = document.getElementById('filtCav').value.trim();

  if (!filtFecha && !filtNombre && !filtRef && !filtCav && !selectedCat) {
    document.getElementById('resultsArea').innerHTML = '<div class="no-results"><strong>Agrega al menos un filtro</strong>Usa fecha, nombre, referencia, cavidad o categoría.</div>';
    return;
  }

  document.getElementById('resultsArea').innerHTML = '<div class="loading"><span class="spinner"></span>Buscando...</div>';
  document.getElementById('btnBuscar').disabled = true;

  var url = SCRIPT_URL + '?accion=buscar_torno&t=' + Date.now();
  if (filtFecha)  url += '&fecha='    + encodeURIComponent(filtFecha);
  if (filtNombre) url += '&nombre='   + encodeURIComponent(filtNombre);
  if (filtRef)    url += '&ref='      + encodeURIComponent(filtRef);
  if (filtCav)    url += '&cav='      + encodeURIComponent(filtCav);
  if (selectedCat) url += '&categoria=' + encodeURIComponent(selectedCat);

  fetch(url, {redirect: 'follow'})
    .then(function(r){ return r.json(); })
    .then(function(data) {
      document.getElementById('btnBuscar').disabled = false;
      mostrarResultados(data.resultados || [], filtCav);
    })
    .catch(function() {
      document.getElementById('btnBuscar').disabled = false;
      document.getElementById('resultsArea').innerHTML = '<div class="no-results"><strong>Error de conexión</strong>Intenta de nuevo.</div>';
    });
}

function mostrarResultados(resultados, filtCav) {
  var area = document.getElementById('resultsArea');
  if (resultados.length === 0) {
    area.innerHTML = '<div class="no-results"><strong>Sin resultados</strong>No se encontraron registros con los filtros aplicados.</div>';
    return;
  }

  var html = '<div class="results-header">Se encontraron <span>' + resultados.length + '</span> registro' + (resultados.length > 1 ? 's' : '') + '</div>';

  resultados.forEach(function(r) {
    html += '<div class="result-card">';
    html += '<div class="result-top">';
    html += '<span class="result-fecha">' + r.fecha + '</span>';
    html += '<span class="result-nombre">' + r.nombre + '</span>';
    html += '<span class="badge-torno">TORNO</span>';
    html += '</div>';

    // Counts
    html += '<div class="counts-section">';

    // MOLDES group
    var molTotal = (parseInt(r.mol_cepillado)||0) + (parseInt(r.mol_diametro)||0) + (parseInt(r.mol_cuello)||0) + (parseInt(r.mol_reforma)||0);
    if (molTotal > 0) {
      html += '<div class="counts-group">';
      html += '<div class="counts-group-title">Moldes</div>';
      html += '<div class="counts-row">';
      html += countItem('Cepillado', r.mol_cepillado);
      html += countItem('Diametro', r.mol_diametro);
      html += countItem('Cuello', r.mol_cuello);
      html += countItem('Reforma', r.mol_reforma);
      html += '</div></div>';
    }

    // PREMOLDES group
    var preTotal = (parseInt(r.pre_cuello)||0) + (parseInt(r.pre_diametro)||0) + (parseInt(r.pre_registro)||0) + (parseInt(r.pre_cepillado)||0) + (parseInt(r.pre_empate)||0);
    if (preTotal > 0) {
      html += '<div class="counts-group">';
      html += '<div class="counts-group-title">Premoldes</div>';
      html += '<div class="counts-row">';
      html += countItem('Cuello', r.pre_cuello);
      html += countItem('Diametro', r.pre_diametro);
      html += countItem('Registro', r.pre_registro);
      html += countItem('Cepillado', r.pre_cepillado);
      html += countItem('Empate', r.pre_empate);
      html += '</div></div>';
    }

    // ANILLOS & TAPAS
    var simpleRow = '';
    if (r.anillos && r.anillos !== '0') simpleRow += countItem('Anillos', r.anillos);
    if (r.tapas && r.tapas !== '0') simpleRow += countItem('Tapas', r.tapas);
    if (simpleRow) {
      html += '<div class="counts-group"><div class="counts-row">' + simpleRow + '</div></div>';
    }

    html += '</div>';

    // References
    if (r.refs && r.refs.length > 0) {
      html += '<div class="result-refs">';
      r.refs.forEach(function(ref) {
        html += '<div class="ref-row">';
        html += '<div class="ref-header">';
        html += '<span class="ref-name">' + (ref.nombre || '—') + '</span>';
        if (ref.categoria) html += '<span class="ref-cat">' + ref.categoria + '</span>';
        if (ref.subtipo) html += '<span class="ref-sub">' + ref.subtipo + '</span>';
        html += '</div>';
        if (ref.cavidades) {
          var cavs = ref.cavidades.split(',').map(function(c){ return c.trim(); }).filter(Boolean);
          if (cavs.length > 0) {
            var cavHtml = cavs.map(function(c) {
              return (filtCav && c === filtCav) ? '<span class="cav-match">' + c + '</span>' : c;
            }).join(', ');
            html += '<div class="ref-cavs">Cavidades: ' + cavHtml + '</div>';
          }
        }
        if (ref.comentario) html += '<div class="ref-comment">' + ref.comentario + '</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '</div>';
  });

  area.innerHTML = html;
}

function countItem(label, val) {
  var n = parseInt(val) || 0;
  return '<div class="count-item' + (n > 0 ? ' nonzero' : '') + '">' + label + ' <strong>' + n + '</strong></div>';
}

function limpiar() {
  document.getElementById('filtFecha').value = '';
  document.getElementById('filtNombre').value = '';
  document.getElementById('filtRef').value = '';
  document.getElementById('filtCav').value = '';
  document.getElementById('ultimoBanner').style.display = 'none';
  document.querySelectorAll('.cat-pill').forEach(function(p){ p.classList.remove('active'); });
  document.querySelector('.cat-pill[data-cat=""]').classList.add('active');
  selectedCat = '';
  document.getElementById('resultsArea').innerHTML = '';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') buscar(); });
</script>
</body>
</html>
